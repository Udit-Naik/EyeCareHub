<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Users - EYECAREHUB Admin</title>

    <!-- Fonts & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="css/admin.css" />
    <style>
      /* ================= PAGINATION ================= */
      #pagination {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 6px;
      }

      .page-btn {
        background: #1a1a1a;
        color: #aaa;
        border: none;
        padding: 7px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        min-width: 36px;
      }

      .page-btn:hover {
        background: #c8ff00;
        color: #000;
      }

      .page-btn.active {
        background: #c8ff00;
        color: #000;
        font-weight: 600;
        box-shadow: 0 0 10px rgba(200, 255, 0, 0.5);
      }

      .page-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .dots {
        color: #666;
      }
    </style>
  </head>

  <body style="background: #0a0a0a">
    <!-- ─── SIDEBAR ───────────────────────── -->
    <aside class="admin-sidebar">
      <a href="../index.html" class="admin-logo">
        EYECAREHUB<span style="color: var(--accent-color)">.</span>
      </a>

      <nav class="admin-nav">
        <a href="index.html" class="admin-nav-item">
          <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>

        <a href="users.html" class="admin-nav-item active">
          <i class="fa-solid fa-users"></i> Users
        </a>

        <a href="products.html" class="admin-nav-item">
          <i class="fa-solid fa-box"></i> Products
        </a>

        <a href="orders.html" class="admin-nav-item">
          <i class="fa-solid fa-receipt"></i> Orders
        </a>

        <a href="settings.html" class="admin-nav-item">
          <i class="fa-solid fa-gear"></i> Settings
        </a>
      </nav>
    </aside>

    <!-- ─── MAIN CONTENT ───────────────────── -->
    <main class="admin-main">
      <!-- Header -->
      <header class="admin-header">
        <h1 class="admin-title">Users</h1>

        <!-- ✅ BUTTON -->
        <button
          onclick="openAddUser(event)"
          class="btn-clean"
          style="
            padding: 10px 20px;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 8px;
          "
        >
          <i class="fa-solid fa-plus"></i> Add User
        </button>
      </header>

      <!-- Table -->
      <div class="data-table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Role</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="users-table-body">
            <!-- JS will load data -->
          </tbody>
        </table>

        <!-- Pagination -->
        <div id="pagination" style="margin-top: 20px; text-align: center"></div>
      </div>
    </main>

    <!-- ─── USER MODAL ───────────────────── -->
    <div id="user-modal" class="modal-backdrop">
      <div class="modal-box" onclick="event.stopPropagation()">
        <!-- Close -->
        <button type="button" class="modal-close" onclick="closeModal()">
          &times;
        </button>

        <h2 id="modal-title">Add New User</h2>

        <form id="user-form">
          <input type="hidden" id="user-id" />

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required />
          </div>

          <div class="form-group">
            <label>Role</label>
            <select id="role">
              <option value="USER">User</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>

          <button type="submit" class="btn-primary">Save User</button>
        </form>
      </div>
    </div>

    <!-- ─── SCRIPTS (IMPORTANT ORDER) ───── -->
    <script src="../js/api.js"></script>
    <script src="./js/admin.js"></script>
    <script src="../js/cursor.js"></script>
  </body>
</html>
