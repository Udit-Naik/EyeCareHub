<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Products - EYECAREHUB Admin</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="stylesheet" href="css/admin.css" />

    <style>
      /* ================= BASE ================= */
      body {
        background: radial-gradient(circle at top, #0f0f0f, #050505);
        font-family: "Outfit", sans-serif;
        color: #fff;
        margin: 0;
      }

      /* ================= MODAL BACKDROP ================= */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(10px);
        z-index: 9999;

        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .modal-backdrop.open {
        opacity: 1;
        pointer-events: all;
      }

      /* ================= MODAL ================= */
      .modal-content {
        position: relative;
        background: rgba(20, 20, 20, 0.85);
        backdrop-filter: blur(20px);
        padding: 30px;
        border-radius: 18px;
        width: 420px;

        border: 1px solid rgba(255, 255, 255, 0.05);

        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.6),
          0 0 30px rgba(200, 255, 0, 0.05);

        transform: scale(0.9);
        opacity: 0;
        transition: all 0.25s ease;
      }

      .modal-backdrop.open .modal-content {
        transform: scale(1);
        opacity: 1;
      }

      /* ================= CLOSE BUTTON ================= */
      .modal-close {
        position: absolute;
        top: 14px;
        right: 16px;
        font-size: 18px;
        cursor: pointer;
        opacity: 0.6;
        transition: 0.2s;
      }

      .modal-close:hover {
        opacity: 1;
      }

      /* ================= TITLE ================= */
      #product-modal-title {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 20px;
      }

      /* ================= FORM ================= */
      .form-group {
        margin-bottom: 15px;
      }

      label {
        font-size: 13px;
        color: #aaa;
        margin-bottom: 5px;
        display: block;
      }

      /* ================= INPUT ================= */
      .form-input {
        width: 100%;
        padding: 11px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        color: #fff;
        border-radius: 10px;
        transition: 0.25s;
      }

      /* hover */
      .form-input:hover {
        border-color: #444;
      }

      /* focus glow */
      .form-input:focus {
        border-color: #c8ff00;
        box-shadow: 0 0 8px rgba(200, 255, 0, 0.3);
        outline: none;
      }

      /* ================= GRID ================= */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* ================= BUTTON ================= */
      button[type="submit"] {
        width: 100%;
        margin-top: 18px;
        background: linear-gradient(135deg, #c8ff00, #aaff00);
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.25s;
        box-shadow: 0 5px 20px rgba(200, 255, 0, 0.3);
      }

      button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(200, 255, 0, 0.5);
      }

      button:active {
        transform: scale(0.97);
      }

      /* ================= TABLE ================= */
      .data-table {
        width: 100%;
        border-collapse: collapse;
      }

      .data-table th,
      .data-table td {
        padding: 12px;
        text-align: left;
      }

      .data-table img {
        border-radius: 8px;
      }

      /* row hover */
      .data-table tbody tr {
        transition: 0.2s;
      }

      .data-table tbody tr:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      /* ================= PAGINATION ================= */
      #pagination {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 6px;
      }

      .page-btn {
        background: #1a1a1a;
        color: #aaa;
        border: none;
        padding: 7px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        min-width: 36px;
      }

      .page-btn:hover {
        background: #c8ff00;
        color: #000;
      }

      .page-btn.active {
        background: #c8ff00;
        color: #000;
        font-weight: 600;
        box-shadow: 0 0 10px rgba(200, 255, 0, 0.5);
      }

      .page-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .dots {
        color: #666;
      }

      /* ================= SCROLLBAR ================= */
      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #444;
      }
    </style>
  </head>

  <body style="background: #0a0a0a">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <a href="../index.html" class="admin-logo"
        >EYECAREHUB<span style="color: var(--accent-color)">.</span></a
      >

      <nav class="admin-nav">
        <a href="index.html" class="admin-nav-item"
          ><i class="fa-solid fa-chart-line"></i> Dashboard</a
        >
        <a href="users.html" class="admin-nav-item"
          ><i class="fa-solid fa-users"></i> Users</a
        >
        <a href="products.html" class="admin-nav-item active"
          ><i class="fa-solid fa-box"></i> Products</a
        >
        <a href="orders.html" class="admin-nav-item"
          ><i class="fa-solid fa-receipt"></i> Orders</a
        >
        <a href="settings.html" class="admin-nav-item"
          ><i class="fa-solid fa-gear"></i> Settings</a
        >
      </nav>
    </aside>

    <!-- Main -->
    <main class="admin-main">
      <header class="admin-header">
        <h1 class="admin-title">Products</h1>

        <button
          class="btn-clean"
          onclick="openAddProductModal()"
          style="
            padding: 10px 20px;
            background: var(--accent-color);
            border: none;
          "
        >
          <i class="fa-solid fa-plus"></i> Add Product
        </button>
      </header>

      <!-- TABLE -->
      <div class="data-table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="products-table-body">
            <!-- JS -->
          </tbody>
        </table>

        <!-- PAGINATION -->
        <div id="pagination" style="margin-top: 20px; text-align: center"></div>
      </div>
    </main>

    <!-- MODAL -->
    <div class="modal-backdrop" id="product-modal">
      <div class="modal-content">
        <span class="modal-close" onclick="closeProductModal()">
          <i class="fa-solid fa-xmark"></i>
        </span>

        <h2 id="product-modal-title">Add Product</h2>

        <form id="product-form">
          <input type="hidden" id="product-id" />

          <!-- NAME -->
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="product-name" required class="form-input" />
          </div>

          <!-- CATEGORY -->
          <div class="form-group">
            <label>Category</label>
            <select id="product-category" class="form-input">
              <option>Eyeglasses</option>
              <option>Sunglasses</option>
              <option>Contact Lenses</option>
              <option>Computer Glasses</option>
            </select>
          </div>

          <!-- BRAND -->
          <div class="form-group">
            <label>Brand</label>
            <input type="text" id="product-brand" required class="form-input" />
          </div>

          <!-- GENDER -->
          <div class="form-group">
            <label>Gender</label>
            <select id="product-gender" class="form-input">
              <option>Unisex</option>
              <option>Men</option>
              <option>Women</option>
              <option>Kids</option>
            </select>
          </div>

          <!-- PRICE + STOCK -->
          <div class="grid-2">
            <div>
              <label>Price</label>
              <input
                type="number"
                id="product-price"
                required
                class="form-input"
              />
            </div>

            <div>
              <label>Stock</label>
              <input
                type="number"
                id="product-stock"
                required
                class="form-input"
              />
            </div>
          </div>

          <!-- DISCOUNT (SMALL FIELD) -->
          <div class="grid-2">
            <div>
              <label>Discount (%)</label>
              <input
                type="number"
                id="product-discount"
                min="0"
                placeholder="e.g. 20"
                class="form-input"
              />
            </div>

            <div></div>
          </div>

          <!-- DESCRIPTION (FULL WIDTH) -->
          <div class="form-group">
            <label>Description</label>
            <textarea
              id="product-description"
              rows="3"
              placeholder="Enter product details..."
              class="form-input"
            ></textarea>
          </div>

          <!-- IMAGE -->
          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="product-image" required class="form-input" />
          </div>

          <!-- BUTTON -->
          <button type="submit">Save Product</button>
        </form>
      </div>
    </div>

    <!-- SCRIPTS (ORDER VERY IMPORTANT) -->
    <script src="../js/api.js"></script>
    <script src="./js/admin.js"></script>
    <script src="../js/cursor.js"></script>
  </body>
</html>
