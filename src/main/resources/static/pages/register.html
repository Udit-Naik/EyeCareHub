<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EYECAREHUB</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/antigravity.css">
</head>

<body style="background: #0a0a0a;">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">EYECAREHUB<span class="text-accent">.</span></div>
            <h2 class="auth-title">Create Account</h2>

            <form id="registerForm" novalidate autocomplete="off">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="John Doe" required>
                    <div class="error-msg" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                    <div class="error-msg" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="mobile" class="form-input" placeholder="9876543210" required>
                    <div class="error-msg" id="mobileError"></div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Create strong password"
                            required>
                        <i class="fa-regular fa-eye password-toggle" onclick="togglePassword('password')"></i>
                    </div>
                    <div class="error-msg" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm password"
                        required>
                    <div class="error-msg" id="confirmError"></div>
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
            </form>

            <div id="form-message" style="margin-top:10px; text-align:center;"></div>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>
